<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palazzo Marconi</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #ffffff;
    color: #111;
}

.container {
    max-width: 720px;
    margin: auto;
    padding: 25px;
}

.lang-switch {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-bottom: 20px;
}

.lang-btn {
    border: none;
    background: #f1f1f1;
    padding: 6px 12px;
    border-radius: 30px;
    cursor: pointer;
}

.section {
    margin-bottom: 30px;
}

h1 {
    font-size: 32px;
    margin-bottom: 10px;
}

h2 {
    font-size: 18px;
    margin-bottom: 8px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 1px;
}

p, li {
    font-size: 15px;
    line-height: 1.7;
}

ul {
    padding-left: 18px;
}

.whatsapp {
    display: block;
    text-align: center;
    background: black;
    color: white;
    padding: 14px;
    border-radius: 30px;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="container">

<div class="lang-switch">
<button class="lang-btn" onclick="setLang('it')">🇮🇹 IT</button>
<button class="lang-btn" onclick="setLang('en')">🇬🇧 EN</button>
</div>

<div class="section">
<h1 data-it="Palazzo Marconi" data-en="Palazzo Marconi"></h1>
<p data-it="Benvenuti a Palazzo Marconi..." data-en="Welcome to Palazzo Marconi..."></p>
</div>

<!-- anche qui incolli TUTTO il contenuto già fatto prima -->

<script>
function setLang(lang) {
document.querySelectorAll("[data-it]").forEach(el => {
el.innerText = el.getAttribute("data-" + lang);
});
}
let userLang = navigator.language;
setLang(userLang.startsWith("it") ? "it" : "en");
</script>

</body>
</html>
